<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rx Aftercare — Admin Login</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    body {
      font-family: 'Segoe UI', sans-serif;
      background: linear-gradient(135deg, #1a1a2e 0%, #1e3c72 60%, #2a5298 100%);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 20px;
    }

    /* subtle animated background grid */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(240,192,64,0.04) 1px, transparent 1px),
        linear-gradient(90deg, rgba(240,192,64,0.04) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none;
    }

    .login-wrap {
      width: 100%;
      max-width: 420px;
      position: relative;
      z-index: 1;
    }

    /* logo area */
    .logo-area {
      text-align: center;
      margin-bottom: 32px;
    }

    .logo-area img {
      height: 56px;
      margin-bottom: 14px;
      filter: drop-shadow(0 2px 8px rgba(0,0,0,0.4));
    }

    .logo-area .tagline {
      color: rgba(255,255,255,0.55);
      font-size: 13px;
      letter-spacing: 0.5px;
    }

    /* card */
    .login-card {
      background: white;
      border-radius: 16px;
      padding: 40px 36px;
      box-shadow: 0 24px 64px rgba(0,0,0,0.35);
    }

    .card-title {
      font-size: 20px;
      font-weight: 700;
      color: #1e3c72;
      margin-bottom: 6px;
    }

    .card-sub {
      font-size: 13px;
      color: #888;
      margin-bottom: 30px;
    }

    /* error banner */
    .error-banner {
      background: #fff2f2;
      border: 1px solid #f5c6cb;
      border-left: 4px solid #e74c3c;
      color: #c0392b;
      padding: 12px 14px;
      border-radius: 8px;
      font-size: 13px;
      margin-bottom: 22px;
      display: none;
    }

    .error-banner.visible { display: block; }

    /* form fields */
    .field {
      margin-bottom: 20px;
    }

    .field label {
      display: block;
      font-size: 12px;
      font-weight: 700;
      text-transform: uppercase;
      letter-spacing: 0.6px;
      color: #555;
      margin-bottom: 8px;
    }

    .field input {
      width: 100%;
      padding: 12px 14px;
      border: 2px solid #e0e0e0;
      border-radius: 8px;
      font-size: 14px;
      color: #222;
      transition: border-color 0.2s, box-shadow 0.2s;
      background: #fafafa;
    }

    .field input:focus {
      outline: none;
      border-color: #1e3c72;
      background: white;
      box-shadow: 0 0 0 3px rgba(30,60,114,0.1);
    }

    /* submit button */
    .btn-signin {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #1e3c72, #2a5298);
      color: white;
      border: none;
      border-radius: 8px;
      font-size: 15px;
      font-weight: 700;
      cursor: pointer;
      margin-top: 8px;
      transition: opacity 0.2s, transform 0.1s;
      position: relative;
      overflow: hidden;
    }

    .btn-signin:hover:not(:disabled) {
      opacity: 0.93;
      transform: translateY(-1px);
    }

    .btn-signin:active:not(:disabled) {
      transform: translateY(0);
    }

    .btn-signin:disabled {
      background: #b0b8c8;
      cursor: not-allowed;
      transform: none;
    }

    /* spinner inside button */
    .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 3px solid rgba(255,255,255,0.4);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      position: absolute;
      right: 18px;
      top: 50%;
      transform: translateY(-50%);
    }

    .btn-signin.loading .spinner { display: block; }

    @keyframes spin {
      to { transform: translateY(-50%) rotate(360deg); }
    }

    /* backend status dot */
    .status-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 24px;
      padding-top: 20px;
      border-top: 1px solid #f0f0f0;
      font-size: 12px;
      color: #999;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #ccc;
      flex-shrink: 0;
      transition: background 0.3s;
    }

    .status-dot.ok      { background: #27ae60; }
    .status-dot.error   { background: #e74c3c; }
    .status-dot.checking {
      background: #f0c040;
      animation: pulse 1s ease-in-out infinite;
    }

    @keyframes pulse {
      0%, 100% { opacity: 1; }
      50%       { opacity: 0.4; }
    }

    /* footer */
    .footer {
      text-align: center;
      margin-top: 24px;
      font-size: 11px;
      color: rgba(255,255,255,0.35);
      letter-spacing: 0.3px;
    }
  </style>
</head>
<body>

  <div class="login-wrap">

    <div class="logo-area">
      <!-- Logo is embedded as base64-compatible img; falls back gracefully if not found -->
      <img src="Rx_Logo_White_UltraSharp.png"
           onerror="this.style.display='none'; document.querySelector('.logo-fallback').style.display='block'"
           alt="Rx Aftercare">
      <div class="logo-fallback" style="display:none;color:#f0c040;font-size:28px;font-weight:900;letter-spacing:-1px;margin-bottom:10px;">
        🎯 Rx Aftercare
      </div>
      <div class="tagline">Professional Development Tracking Platform</div>
    </div>

    <div class="login-card">
      <div class="card-title">Admin Sign In</div>
      <div class="card-sub">Gray Matters Group</div>

      <div class="error-banner" id="errorBanner"></div>

      <form id="loginForm" autocomplete="on">
        <div class="field">
          <label>Email Address</label>
          <input type="email" id="email" name="email"
                 placeholder="admin@rxaftercare.com"
                 autocomplete="username" required autofocus>
        </div>

        <div class="field">
          <label>Password</label>
          <input type="password" id="password" name="password"
                 placeholder="••••••••••"
                 autocomplete="current-password" required>
        </div>

        <button type="submit" class="btn-signin" id="signinBtn">
          Sign In
          <div class="spinner"></div>
        </button>
      </form>

      <div class="status-bar">
        <div class="status-dot checking" id="statusDot"></div>
        <span id="statusText">Checking backend connection…</span>
      </div>
    </div>

    <div class="footer">Rx Aftercare &copy; Gray Matters Group</div>
  </div>

  <script>
    // ── config ────────────────────────────────────────────────────────────────
    // Change this to your production URL when deploying
    const API_URL = window.location.hostname === 'localhost' || window.location.hostname === '127.0.0.1'
  ? 'http://localhost:3000/api'
  : 'https://rx-aftercare-backend-production.up.railway.app/api';

    // ── elements ──────────────────────────────────────────────────────────────
    const form       = document.getElementById('loginForm');
    const emailEl    = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const errorEl    = document.getElementById('errorBanner');
    const signinBtn  = document.getElementById('signinBtn');
    const statusDot  = document.getElementById('statusDot');
    const statusText = document.getElementById('statusText');

    // ── health check ──────────────────────────────────────────────────────────
    async function checkBackend() {
      try {
        const healthUrl = API_URL.replace('/api', '') + '/health';
        const res = await fetch(healthUrl, { signal: AbortSignal.timeout(4000) });
        if (res.ok) {
          statusDot.className  = 'status-dot ok';
          statusText.textContent = 'Backend connected — ready to sign in';
        } else {
          throw new Error('Non-OK status');
        }
      } catch {
        statusDot.className  = 'status-dot error';
        statusText.textContent = 'Cannot reach backend (localhost:3000) — is the server running?';
      }
    }

    // ── form submit ───────────────────────────────────────────────────────────
    form.addEventListener('submit', async (e) => {
      e.preventDefault();

      const email    = emailEl.value.trim();
      const password = passwordEl.value;

      // reset error
      errorEl.classList.remove('visible');
      errorEl.textContent = '';

      // loading state
      signinBtn.disabled = true;
      signinBtn.classList.add('loading');
      signinBtn.childNodes[0].textContent = 'Signing in… ';

      try {
        const res = await fetch(`${API_URL}/auth/admin/login`, {
          method:  'POST',
          headers: { 'Content-Type': 'application/json' },
          body:    JSON.stringify({ email, password })
        });

        const data = await res.json();

        if (data.success && data.token) {
          // Persist auth
          localStorage.setItem('adminToken', data.token);
          localStorage.setItem('adminEmail', data.admin?.email || email);
          localStorage.setItem('adminName',  data.admin?.name  || 'Admin');

          // Redirect to admin panel
          window.location.href = 'RX_ADMIN_WORKING_v11.html';
        } else {
          throw new Error(data.error || 'Login failed — please check your credentials.');
        }

      } catch (err) {
        showError(err.message.includes('fetch')
          ? 'Cannot connect to backend. Make sure the server is running on port 3000.'
          : err.message);
      } finally {
        signinBtn.disabled = false;
        signinBtn.classList.remove('loading');
        signinBtn.childNodes[0].textContent = 'Sign In ';
      }
    });

    function showError(msg) {
      errorEl.textContent = '⚠️  ' + msg;
      errorEl.classList.add('visible');
      passwordEl.value = '';
      passwordEl.focus();
    }

    // ── init ─────────────────────────────────────────────────────────────────
    // Validate existing token before redirecting (prevents flash loop)
    async function checkExistingToken() {
      const token = localStorage.getItem('adminToken');
      if (!token) {
        checkBackend();
        return;
      }
      try {
        // Verify token is still valid by calling a protected endpoint
        const res = await fetch(API_URL + '/admin/profile', {
          headers: { 'Authorization': 'Bearer ' + token },
          signal: AbortSignal.timeout(4000)
        });
        if (res.ok) {
          window.location.href = 'RX_ADMIN_WORKING_v11.html';
        } else {
          // Token expired or invalid — clear it and show login
          localStorage.removeItem('adminToken');
          localStorage.removeItem('adminEmail');
          localStorage.removeItem('adminName');
          checkBackend();
        }
      } catch {
        // Network error — just show login
        localStorage.removeItem('adminToken');
        checkBackend();
      }
    }

    checkExistingToken();
  </script>

</body>
</html>
