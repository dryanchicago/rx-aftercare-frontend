<!DOCTYPE html><html><head><meta charset="UTF-8"><title>Rx Dashboard</title>
<style>
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:Segoe UI,sans-serif;background:linear-gradient(135deg,#1e3c72,#2a5298);min-height:100vh;padding:20px}
.wrap{max-width:1100px;margin:0 auto;background:white;border-radius:16px;overflow:hidden}
.header{display:flex;align-items:center;justify-content:space-between;padding:16px 32px;background:white;border-bottom:3px solid #1e3c72}
.hdr-gmg,.hdr-rx{max-height:45px;object-fit:contain}
.hdr-client{max-height:50px;object-fit:contain}
.subhdr{background:#1e3c72;color:white;padding:18px 32px;text-align:center}
.subhdr h1{font-size:24px;color:#f0c040}
.prog-bar{background:#e9ecef;height:6px}
.prog-fill{background:linear-gradient(90deg,#1e3c72,#f0c040);height:100%;width:0%;transition:width .3s}
.welcome{padding:20px 28px;background:#f8f9fa;display:flex;justify-content:space-between;align-items:center}
.welcome h2{color:#1e3c72;font-size:19px}
.timer{background:white;padding:12px 24px;border-radius:12px;text-align:center}
.days{font-size:40px;font-weight:bold;color:#1e3c72}
.dlbl{font-size:11px;color:#888;text-transform:uppercase}
.instr{margin:16px 28px;padding:14px 18px;background:#fff8e1;border-left:4px solid #f0c040;border-radius:8px}
.instr h3{color:#7a6000;font-size:14px;margin-bottom:8px}
.instr ul{margin-left:18px;color:#7a6000}
.instr li{font-size:13px;margin-bottom:4px}
.content{padding:16px 28px}
.loading{text-align:center;padding:60px;color:#666;font-size:16px}
.error-msg{text-align:center;padding:40px;color:#c0392b;font-size:15px}
.gcard{border:2px solid #e9ecef;border-radius:12px;margin-bottom:12px;overflow:hidden}
.ghdr{background:#f8f9fa;padding:16px 18px;display:flex;align-items:center;gap:12px;cursor:pointer}
.ghdr:hover{background:#e9ecef}
.gcb{width:22px;height:22px;cursor:pointer;accent-color:#1e3c72}
.gtitle{flex:1;font-size:16px;font-weight:700;color:#2c3e50}
.gbadge{background:#1e3c72;color:white;padding:4px 12px;border-radius:20px;font-size:12px;font-weight:600}
.gicon{font-size:15px;color:#1e3c72;transition:transform .3s}
.gcard.open .gicon{transform:rotate(180deg)}
.aPanel{display:none;padding:16px 18px;border-top:2px solid #e9ecef}
.gcard.open .aPanel{display:block}
.aHdr{font-size:12px;color:#888;font-weight:600;margin-bottom:12px}
.aItem{display:flex;gap:10px;padding:9px 10px;border-radius:7px;margin-bottom:6px;background:#f8f9fa;align-items:flex-start}
.acb{margin-top:2px;width:17px;height:17px;cursor:pointer;accent-color:#1e3c72}
.atxt{flex:1;font-size:13px;line-height:1.5;color:#444;white-space:pre-wrap}
.custArea{margin-top:14px;padding-top:14px;border-top:2px dashed #ddd}
.custInput{width:100%;padding:9px;border:2px solid #ddd;border-radius:7px;font-size:13px;margin-top:7px}
.custBtn{background:#1e3c72;color:white;border:none;padding:9px 15px;border-radius:7px;cursor:pointer;font-size:13px;font-weight:600;margin-top:7px}
.summary{background:linear-gradient(135deg,#1a1a2e,#1e3c72);color:white;padding:24px 28px;margin:10px 28px 18px;border-radius:12px;text-align:center}
.summary h3{color:#f0c040;font-size:19px;margin-bottom:16px}
.stats{display:flex;justify-content:space-around;flex-wrap:wrap;gap:14px}
.stat{background:rgba(255,255,255,.15);padding:14px 24px;border-radius:10px}
.snum{font-size:34px;font-weight:bold;color:#f0c040}
.slbl{font-size:12px;opacity:.85}
.abuts{display:flex;gap:14px;justify-content:center;padding:14px 28px}
.btn{padding:13px 32px;border:none;border-radius:8px;font-size:15px;font-weight:700;cursor:pointer}
.btn-p{background:#1e3c72;color:white}
.btn-s{background:white;color:#1e3c72;border:2px solid #1e3c72}
</style>
</head>

  </div>
  <div class="prog-bar"><div class="prog-fill" id="pf"></div></div>
  <div class="subhdr"><h1 id="programTitle">Rx Aftercare Program</h1><p id="programSubtitle">90-Day Goal Setting</p></div>
  <div class="welcome">
    <div><h2>Welcome!</h2><p>Build your plan.</p></div>
    <div class="timer"><div class="days" id="daysNum">90</div><div class="dlbl">Days Remaining</div></div>
  </div>
  <div class="instr">
    <h3>📋 Instructions</h3>
    <ul>
      <li>Select <strong>at least 4 goals</strong></li>
      <li>Choose <strong>minimum 3 activities</strong> per goal</li>
      <li>Add custom if desired</li>
      <li>Save PDF</li>
    </ul>
  </div>
  <div class="content" id="gc"><div class="loading">⏳ Loading your program...</div></div>
  <div class="summary"><h3>Your Commitments</h3><div class="stats">
    <div class="stat"><div class="snum" id="gs">0</div><div class="slbl">Goals</div></div>
    <div class="stat"><div class="snum" id="as">0</div><div class="slbl">Activities</div></div>
    <div class="stat"><div class="snum" id="cs">0</div><div class="slbl">Custom</div></div>
  </div></div>
  <div class="abuts">
    <button class="btn btn-s" onclick="resetAll()">Reset</button>
    <button class="btn btn-p" onclick="savePDF()">🖨️ Print / Save PDF</button>
  </div>
</div>
<script>
var API_BASE=window.location.hostname==="localhost"||window.location.hostname==="127.0.0.1"?"http://localhost:3000/api":"https://rx-aftercare-backend-production.up.railway.app/api";
var goals=[];
var className="";
var clientName="";
var durationDays=90;
var pc="#1e3c72";
var sG=new Set(),sA={},cA={};

function getClassId(){
  var params=new URLSearchParams(window.location.search);
  return params.get("classId");
}

window.onload=async function(){
  var classId=getClassId();
  if(!classId){
    document.getElementById("gc").innerHTML='<div class="error-msg">❌ No class specified. Please use the link provided by your instructor.</div>';
    return;
  }
  try{
    var res=await fetch(API_BASE+"/classes/"+classId);
    var data=await res.json();
    if(!data||!data.id||!data.goals){
      document.getElementById("gc").innerHTML='<div class="error-msg">❌ Class not found. Please check your link.</div>';
      return;
    }
    var cls=data;
    className=cls.name||"";
    clientName=cls.client||"";
    durationDays=cls.duration_days||90;
    if(cls.primary_color)pc=cls.primary_color;

    // Update page title and days display
    document.getElementById("programTitle").textContent="Rx Aftercare Program";
    document.getElementById("programSubtitle").textContent=durationDays+"-Day Goal Setting";
    document.getElementById("daysNum").textContent=durationDays;

    // Set client logo
    if(cls.logo_data){
      var cl=document.getElementById("clientLogo");
      cl.src=cls.logo_data;
      cl.alt=cls.client||"";cl.style.display="block";
    }

    goals=(cls.goals||[]).map(function(g){
      return{id:g.id,title:g.title,activities:(g.activities||[]).map(function(a){return a.content||a;})};
    });

    init();
  }catch(e){
    console.error("Load error:",e);
    document.getElementById("gc").innerHTML='<div class="error-msg">❌ Could not connect to server. Please make sure the backend is running.</div>';
  }
};

function init(){
  var c=document.getElementById("gc");
  c.innerHTML="";
  goals.forEach(function(g){
    var d=document.createElement("div");
    d.className="gcard";
    d.id="sg"+g.id;
    var ah="";
    g.activities.forEach(function(a,ai){
      ah+='<div class="aItem"><input type="checkbox" class="acb" id="a'+g.id+'_'+ai+'" onchange="ta('+g.id+','+ai+')"><label class="atxt">'+esc(a)+'</label></div>';
    });
    d.innerHTML='<div class="ghdr" onclick="tgl('+g.id+')"><input type="checkbox" class="gcb" id="gc'+g.id+'" onclick="event.stopPropagation();tg('+g.id+')"><div class="gtitle">'+esc(g.title)+'</div><div class="gbadge" id="b'+g.id+'">0</div><span class="gicon">▼</span></div><div class="aPanel"><div class="aHdr">Select minimum 3:</div>'+ah+'<div class="custArea"><div class="aHdr">Add custom:</div><input type="text" class="custInput" id="ci'+g.id+'" placeholder="Your activity..."><button class="custBtn" onclick="ac('+g.id+')">+ Add</button><div id="cl'+g.id+'"></div></div></div>';
    c.appendChild(d);
  });
  upd();
}

function esc(s){if(!s)return"";return String(s).replace(/&/g,"&amp;").replace(/</g,"&lt;").replace(/>/g,"&gt;").replace(/"/g,"&quot;")}
function tgl(id){document.getElementById("sg"+id).classList.toggle("open")}
function tg(id){if(sG.has(id)){sG.delete(id);if(sA[id])delete sA[id];document.getElementById("sg"+id).querySelectorAll(".acb").forEach(function(cb){cb.checked=false})}else{sG.add(id);if(!sA[id])sA[id]=new Set();document.getElementById("sg"+id).classList.add("open")}upd()}
function ta(gid,aid){if(!sA[gid])sA[gid]=new Set();var cb=document.getElementById("a"+gid+"_"+aid);if(cb.checked){sA[gid].add(aid);if(!sG.has(gid)){sG.add(gid);document.getElementById("gc"+gid).checked=true}}else{sA[gid].delete(aid)}ub(gid);upd()}
function ac(gid){var inp=document.getElementById("ci"+gid);var txt=inp.value.trim();if(!txt)return;if(!cA[gid])cA[gid]=[];cA[gid].push(txt);var cl=document.getElementById("cl"+gid);var ci=document.createElement("div");ci.className="aItem";ci.style.background="#fff8e1";ci.innerHTML='<input type="checkbox" class="acb" checked disabled><div class="atxt"><strong>Custom:</strong> '+esc(txt)+'</div>';cl.appendChild(ci);inp.value="";if(!sG.has(gid)){sG.add(gid);document.getElementById("gc"+gid).checked=true}ub(gid);upd()}
function ub(gid){var b=document.getElementById("b"+gid);var n=(sA[gid]?sA[gid].size:0)+(cA[gid]?cA[gid].length:0);b.textContent=n;b.style.background=n>=3?"#28a745":pc}
function upd(){document.getElementById("gs").textContent=sG.size;var ta=0;for(var k in sA)ta+=sA[k].size;document.getElementById("as").textContent=ta;var tc=0;for(var k in cA)tc+=cA[k].length;document.getElementById("cs").textContent=tc;if(goals.length>0)document.getElementById("pf").style.width=(sG.size/goals.length*100)+"%"}

function savePDF(){
  if(sG.size<4){alert("Please select at least 4 goals.");return}
  var err=false;
  sG.forEach(function(gid){var n=(sA[gid]?sA[gid].size:0)+(cA[gid]?cA[gid].length:0);
    if(n<3){err=true;alert(goals.find(function(x){return x.id===gid}).title+" needs at least 3 activities.")}});
  if(err)return;
  var html="<html><head><title>My "+durationDays+"-Day Commitments</title>"
    +"<style>*{box-sizing:border-box}body{font-family:Arial,sans-serif;padding:30px;max-width:750px;margin:0 auto;color:#222}"
    +"h1{color:#1e3c72;border-bottom:3px solid #f0c040;padding-bottom:10px;font-size:22px}"
    +"h2{color:#1e3c72;margin-top:22px;font-size:15px;font-weight:bold}"
    +"ul{margin:6px 0;padding-left:22px}li{margin:5px 0;font-size:13px;line-height:1.5}"
    +"em{color:#888;font-style:normal;font-size:11px}"
    +"p.date{color:#666;font-size:12px;margin-bottom:16px}"
    +"@media print{body{padding:15px}}</style>"
    +"</head><body>"
    +"<h1>My "+durationDays+"-Day Commitments</h1>"
    +"<p class=\"date\">Date: "+new Date().toLocaleDateString()+"</p>";
  sG.forEach(function(gid){
    var g=goals.find(function(x){return x.id===gid});
    html+="<h2>"+g.title+"</h2><ul>";
    if(sA[gid]){sA[gid].forEach(function(ai){html+="<li>"+g.activities[ai]+"</li>"})}
    if(cA[gid]){cA[gid].forEach(function(c){html+="<li><em>[Custom]</em> "+c+"</li>"})}
    html+="</ul>";
  });
  html+="</body></html>";
  var w=window.open("","_blank","width=800,height=700");
  if(!w){alert("Please allow popups for this page, then try again.");return}
  w.document.write(html);
  w.document.close();
  setTimeout(function(){w.print();},600);
}
function resetAll(){if(confirm("Reset all selections?")){sG.clear();sA={};cA={};init()}}
</script>
</body></html>
