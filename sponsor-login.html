<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rx Aftercare — Sponsor Portal</title>
<link href="https://fonts.googleapis.com/css2?family=DM+Serif+Display:ital@0;1&family=DM+Sans:wght@300;400;500;600&display=swap" rel="stylesheet">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --navy:   #0F1E3C;
    --gold:   #C9A227;
    --gold-lt:#E8C84A;
    --blue:   #2A5298;
    --white:  #FFFFFF;
    --off:    #F4F6FA;
    --muted:  #8A9BB8;
    --error:  #C0392B;
  }

  html, body {
    height: 100%;
    font-family: 'DM Sans', sans-serif;
    background: var(--navy);
    color: var(--white);
    overflow: hidden;
  }

  /* ── Background mesh ── */
  .bg {
    position: fixed; inset: 0; z-index: 0;
    background:
      radial-gradient(ellipse 80% 60% at 20% 10%,  rgba(42,82,152,0.45) 0%, transparent 60%),
      radial-gradient(ellipse 60% 80% at 80% 90%,  rgba(201,162,39,0.18) 0%, transparent 55%),
      radial-gradient(ellipse 100% 100% at 50% 50%, #0F1E3C 0%, #070E1E 100%);
  }
  .bg::after {
    content: '';
    position: absolute; inset: 0;
    background-image: url("data:image/svg+xml,%3Csvg width='60' height='60' viewBox='0 0 60 60' xmlns='http://www.w3.org/2000/svg'%3E%3Cg fill='none' fill-rule='evenodd'%3E%3Cg fill='%23ffffff' fill-opacity='0.015'%3E%3Cpath d='M36 34v-4h-2v4h-4v2h4v4h2v-4h4v-2h-4zm0-30V0h-2v4h-4v2h4v4h2V6h4V4h-4zM6 34v-4H4v4H0v2h4v4h2v-4h4v-2H6zM6 4V0H4v4H0v2h4v4h2V6h4V4H6z'/%3E%3C/g%3E%3C/g%3E%3C/svg%3E");
  }

  /* ── Layout ── */
  .page {
    position: relative; z-index: 1;
    min-height: 100vh;
    display: flex;
    align-items: center;
    justify-content: center;
    padding: 40px 20px;
  }

  .card {
    width: 100%;
    max-width: 440px;
    background: rgba(255,255,255,0.04);
    border: 1px solid rgba(255,255,255,0.10);
    border-radius: 20px;
    padding: 52px 48px 44px;
    backdrop-filter: blur(20px);
    box-shadow: 0 32px 80px rgba(0,0,0,0.5), 0 0 0 1px rgba(201,162,39,0.08);
    animation: fadeUp 0.6s ease both;
  }

  @keyframes fadeUp {
    from { opacity: 0; transform: translateY(24px); }
    to   { opacity: 1; transform: translateY(0); }
  }

  /* ── Branding ── */
  .brand {
    text-align: center;
    margin-bottom: 40px;
  }
  .brand-badge {
    display: inline-flex;
    align-items: center;
    gap: 10px;
    background: rgba(201,162,39,0.12);
    border: 1px solid rgba(201,162,39,0.30);
    border-radius: 100px;
    padding: 6px 16px 6px 8px;
    margin-bottom: 24px;
  }
  .brand-dot {
    width: 28px; height: 28px;
    background: var(--gold);
    border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 13px;
  }
  .brand-badge span {
    font-size: 12px;
    font-weight: 600;
    color: var(--gold);
    letter-spacing: 0.08em;
    text-transform: uppercase;
  }
  .brand h1 {
    font-family: 'DM Serif Display', serif;
    font-size: 32px;
    font-weight: 400;
    color: var(--white);
    line-height: 1.1;
    margin-bottom: 8px;
  }
  .brand h1 em {
    font-style: italic;
    color: var(--gold);
  }
  .brand p {
    font-size: 14px;
    color: var(--muted);
    font-weight: 300;
  }

  /* ── Form ── */
  .form-group {
    margin-bottom: 20px;
  }
  label {
    display: block;
    font-size: 12px;
    font-weight: 600;
    letter-spacing: 0.07em;
    text-transform: uppercase;
    color: var(--muted);
    margin-bottom: 8px;
  }
  input {
    width: 100%;
    background: rgba(255,255,255,0.06);
    border: 1px solid rgba(255,255,255,0.12);
    border-radius: 10px;
    padding: 14px 16px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    color: var(--white);
    outline: none;
    transition: border-color 0.2s, background 0.2s, box-shadow 0.2s;
  }
  input::placeholder { color: rgba(255,255,255,0.25); }
  input:focus {
    border-color: var(--gold);
    background: rgba(255,255,255,0.09);
    box-shadow: 0 0 0 3px rgba(201,162,39,0.15);
  }
  input.error { border-color: var(--error); }

  /* ── Error message ── */
  .error-msg {
    display: none;
    background: rgba(192,57,43,0.15);
    border: 1px solid rgba(192,57,43,0.35);
    border-radius: 8px;
    padding: 10px 14px;
    font-size: 13px;
    color: #E8856A;
    margin-bottom: 20px;
    text-align: center;
  }
  .error-msg.show { display: block; }

  /* ── Button ── */
  .btn-signin {
    width: 100%;
    background: var(--gold);
    color: var(--navy);
    border: none;
    border-radius: 10px;
    padding: 15px;
    font-family: 'DM Sans', sans-serif;
    font-size: 15px;
    font-weight: 600;
    cursor: pointer;
    transition: background 0.2s, transform 0.1s, box-shadow 0.2s;
    letter-spacing: 0.02em;
    margin-top: 4px;
    position: relative;
    overflow: hidden;
  }
  .btn-signin:hover {
    background: var(--gold-lt);
    box-shadow: 0 6px 24px rgba(201,162,39,0.35);
  }
  .btn-signin:active { transform: scale(0.98); }
  .btn-signin:disabled {
    opacity: 0.6; cursor: not-allowed; transform: none;
  }
  .btn-signin .spinner {
    display: none;
    width: 18px; height: 18px;
    border: 2px solid rgba(15,30,60,0.3);
    border-top-color: var(--navy);
    border-radius: 50%;
    animation: spin 0.7s linear infinite;
    margin: 0 auto;
  }
  .btn-signin.loading .btn-text { display: none; }
  .btn-signin.loading .spinner { display: block; }
  @keyframes spin { to { transform: rotate(360deg); } }

  /* ── Footer ── */
  .card-footer {
    text-align: center;
    margin-top: 32px;
    padding-top: 24px;
    border-top: 1px solid rgba(255,255,255,0.07);
  }
  .card-footer p {
    font-size: 12px;
    color: rgba(138,155,184,0.7);
  }
  .gmg-logo {
    margin-top: 16px;
    font-size: 11px;
    color: rgba(138,155,184,0.5);
    letter-spacing: 0.1em;
    text-transform: uppercase;
  }
</style>
</head>
<body>

<div class="bg"></div>

<div class="page">
  <div class="card">

    <div class="brand">
      <div class="brand-badge">
        <div class="brand-dot">Rx</div>
        <span>Sponsor Portal</span>
      </div>
      <h1>Welcome<br>back, <em>leader.</em></h1>
      <p>Sign in to view your program dashboard</p>
    </div>

    <div class="error-msg" id="errorMsg"></div>

    <div class="form-group">
      <label for="email">Email Address</label>
      <input type="email" id="email" placeholder="you@company.com" autocomplete="email">
    </div>

    <div class="form-group">
      <label for="password">Password</label>
      <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
    </div>

    <button class="btn-signin" id="signInBtn" onclick="doLogin()">
      <span class="btn-text">Sign In</span>
      <div class="spinner"></div>
    </button>

    <div class="card-footer">
      <p>Access restricted to authorized sponsors.<br>Contact your GMG program manager if you need access.</p>
      <div class="gmg-logo">Gray Matters Group</div>
    </div>

  </div>
</div>

<script>
  const API = 'https://rx-aftercare-backend-production.up.railway.app';

  // Redirect if already logged in
  const existing = localStorage.getItem('sponsor_token');
  if (existing) {
    try {
      const payload = JSON.parse(atob(existing.split('.')[1]));
      if (payload.exp * 1000 > Date.now()) {
        window.location.href = 'sponsor.html';
      } else {
        localStorage.removeItem('sponsor_token');
        localStorage.removeItem('sponsor_data');
      }
    } catch(e) {
      localStorage.removeItem('sponsor_token');
    }
  }

  // Enter key support
  document.getElementById('password').addEventListener('keydown', e => {
    if (e.key === 'Enter') doLogin();
  });
  document.getElementById('email').addEventListener('keydown', e => {
    if (e.key === 'Enter') document.getElementById('password').focus();
  });

  function showError(msg) {
    const el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.classList.add('show');
    document.getElementById('email').classList.add('error');
    document.getElementById('password').classList.add('error');
  }
  function clearError() {
    document.getElementById('errorMsg').classList.remove('show');
    document.getElementById('email').classList.remove('error');
    document.getElementById('password').classList.remove('error');
  }

  async function doLogin() {
    clearError();
    const email    = document.getElementById('email').value.trim();
    const password = document.getElementById('password').value;
    const btn      = document.getElementById('signInBtn');

    if (!email || !password) { showError('Please enter your email and password.'); return; }

    btn.disabled = true;
    btn.classList.add('loading');

    try {
      const res  = await fetch(`${API}/api/sponsors/login`, {
        method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      const data = await res.json();

      if (!res.ok) {
        showError(data.error || 'Sign in failed. Please try again.');
        return;
      }

      localStorage.setItem('sponsor_token', data.token);
      localStorage.setItem('sponsor_data', JSON.stringify(data.sponsor));
      window.location.href = 'sponsor.html';

    } catch(err) {
      showError('Cannot reach server. Please try again in a moment.');
    } finally {
      btn.disabled = false;
      btn.classList.remove('loading');
    }
  }
</script>
</body>
</html>
